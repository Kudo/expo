name: Test Suite

on:
  workflow_dispatch: {}
  push:
    branches: [master, 'sdk-*']
    paths:
      - .github/workflows/test-suite.yml
      - apps/bare-expo/**
      - apps/test-suite/**
      - packages/**
      - yarn.lock
  pull_request:
    paths:
      - .github/workflows/test-suite.yml
      - apps/bare-expo/**
      - apps/test-suite/**
      - packages/**
      - yarn.lock

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: 👀 Checkout
        uses: actions/checkout@v2
        with:
          submodules: true
      - name: 🍺 Install required tools
        run: |
          brew install watchman
          sudo apt-get install libpulse0
          echo "$(pwd)/bin" >> $GITHUB_PATH
      - name: ♻️ Restore workspace node modules
        uses: actions/cache@v2
        id: node-modules-cache
        with:
          path: |
            # See "workspaces" → "packages" in the root package.json for the source of truth of
            # which node_modules are affected by the root yarn.lock
            node_modules
            apps/*/node_modules
            home/node_modules
            packages/*/node_modules
            packages/@unimodules/*/node_modules
            react-native-lab/react-native/node_modules
          key: ${{ runner.os }}-modules-${{ hashFiles('yarn.lock') }}
      - name: 🧶 Install node modules in root dir
        run: yarn install --frozen-lockfile
      - uses: actions/cache@v2
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: ⚛️ Display React Native config
        run: yarn react-native config
        working-directory: apps/bare-expo
      - name: Clean Detox
        run: yarn detox:clean
        working-directory: apps/bare-expo
      - name: Cache build
        id: cache-build
        uses: actions/cache@v2
        with:
          path: |
            apps/bare-expo/android/build
            apps/bare-expo/android/app/build
          key: ${{ runner.os }}-build
      - name: Build Android project for Detox
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: yarn android:detox:build:release
        working-directory: apps/bare-expo
        timeout-minutes: 35
      - name: Run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          cores: 2
          profile: pixel_4
          arch: arm64-v8a
          avd-name: bare-expo
          script: mkdir artifacts ; adb logcat -d > artifacts/adblog1.log ; yarn android:detox:test:release
          working-directory: ./apps/bare-expo
      - name: Store images of build failures
        if: always()
        uses: actions/upload-artifact@v2
        with:
          name: bare-expo-artifacts
          path: apps/bare-expo/artifacts
